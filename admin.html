<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Admin Capsules RAUN</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <h1>🔐 <span class="green">Espace Admin RAUN</span></h1>

  <h2>➕ Nouvelle Capsule</h2>
  <input id="capsuleTitle" type="text" placeholder="Titre" />
  <textarea id="capsuleText" placeholder="Contenu"></textarea>
  <button onclick="publierCapsule()">Publier</button>

  <h2>🛠️ Mettre à jour les anciennes capsules</h2>
  <button onclick="convertirTexte()">🔁 Convertir texte → content/title</button>
  <button onclick="corrigerCapsulesVides()">⚙️ Corriger capsules vides</button>
  <button onclick="remplirContentDepuisChampsSpirituels()">✨ Corriger avec rappel / alignement / projection</button>

  <script src="admin.js"></script>
</body>
</html>
