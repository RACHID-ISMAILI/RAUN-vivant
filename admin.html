<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin RAUN</title>
</head>
<body>
  <h1>🔐 Accès Admin</h1>

  <form id="login-form">
    <input type="email" name="email" placeholder="Email" required />
    <input type="password" name="password" placeholder="Mot de passe" required />
    <button type="submit">Se connecter</button>
  </form>

  <div id="protected" style="display:none;">
    <h2>Bienvenue dans l’espace RAUN secret 🔥</h2>
    <button onclick="logout()">Se déconnecter</button>

    <div id="capsule-form">
      <h3>📜 Écrire une capsule</h3>
      <textarea id="capsuleText" placeholder="Écris ta capsule ici..." rows="6" cols="60"></textarea><br>
      <button onclick="saveCapsule()">Publier</button>
    </div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="auth.js"></script>
  <script type="module" src="firestore.js"></script>
</body>
</html>
