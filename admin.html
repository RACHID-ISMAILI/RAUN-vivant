<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Espace Admin RAUN 🔐</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD0R0IFgjCk3gWgVxK3-WnfLubhAqsKbOM",
      authDomain: "raun-network.firebaseapp.com",
      projectId: "raun-network"
    };
    firebase.initializeApp(firebaseConfig);

    firebase.auth().onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = "login.html";
      }
    });
  </script>
</head>
<body style="background:black;color:lime;font-family:monospace;padding:20px">
  <h2>Espace Admin sécurisé 🔐</h2>
  <textarea id="capsuleText" rows="5" cols="50" placeholder="Écris ta capsule ici..."></textarea><br>
  <button id="publierBtn">Publier</button>
  <script>
    const db = firebase.firestore();
    document.getElementById("publierBtn").addEventListener("click", () => {
      const text = document.getElementById("capsuleText").value.trim();
      if (!text) return alert("Écris une capsule avant de publier.");
      const title = text.split(" ").slice(0, 5).join(" ") + "...";
      db.collection("capsules").add({
        title,
        content: text,
        readCount: 0,
        comments: [],
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => {
        alert("Capsule publiée 🔥");
        document.getElementById("capsuleText").value = "";
      }).catch((e) => alert("Erreur : " + e.message));
    });
  </script>
</body>
</html>
