
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Espace Admin RAUN 🔐</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <style>
    body {
      background-color: black;
      color: lime;
      font-family: monospace;
      padding: 20px;
    }
    input, textarea, button {
      background-color: black;
      color: lime;
      border: 1px solid lime;
      padding: 5px;
      font-family: monospace;
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <h2>Admin RAUN – Ajout de Capsules</h2>

  <div id="login">
    <input type="email" id="email" placeholder="Email admin"><br>
    <input type="password" id="password" placeholder="Mot de passe"><br>
    <button onclick="login()">Connexion Admin</button>
  </div>

  <div id="admin-panel" style="display:none">
    <input type="text" id="title" placeholder="Titre de la capsule"><br>
    <textarea id="content" rows="4" cols="60" placeholder="Contenu de la capsule"></textarea><br>
    <textarea id="alignment" rows="2" cols="60" placeholder="Alignement"></textarea><br>
    <textarea id="projection" rows="2" cols="60" placeholder="Projection"></textarea><br>
    <textarea id="rappel" rows="2" cols="60" placeholder="Rappel"></textarea><br>
    <button onclick="ajouterCapsule()">Ajouter Capsule</button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD0R0IFgjCk3gWgVxK3-WnfLubhAqsKbOM",
      authDomain: "raun-network.firebaseapp.com",
      projectId: "raun-network"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          document.getElementById("login").style.display = "none";
          document.getElementById("admin-panel").style.display = "block";
        })
        .catch(error => alert("Erreur de connexion: " + error.message));
    }

    function ajouterCapsule() {
      const title = document.getElementById("title").value.trim();
      const content = document.getElementById("content").value.trim();
      const alignment = document.getElementById("alignment").value.trim();
      const projection = document.getElementById("projection").value.trim();
      const rappel = document.getElementById("rappel").value.trim();

      if (content && title) {
        db.collection("capsules").add({
          title,
          content,
          alignment,
          projection,
          rappel,
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          votesUp: 0,
          votesDown: 0,
          comments: [],
          readCount: 0
        }).then(() => {
          alert("Capsule ajoutée avec succès");
          document.getElementById("title").value = "";
          document.getElementById("content").value = "";
          document.getElementById("alignment").value = "";
          document.getElementById("projection").value = "";
          document.getElementById("rappel").value = "";
        });
      } else {
        alert("Le titre et le contenu sont requis.");
      }
    }
  </script>
</body>
</html>
