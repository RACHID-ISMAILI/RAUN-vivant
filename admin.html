
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin RAUN</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="admin.js" defer></script>
</head>
<body style="background-color: black; color: lime; font-family: monospace;">
  <h1>🔐 Espace Admin RAUN</h1>

  <div id="auth">
    <input type="password" id="admin-password" placeholder="Mot de passe" />
    <button onclick="checkPassword()">Entrer</button>
  </div>

  <div id="admin-panel" style="display: none;">
    <h2>➕ Nouvelle Capsule</h2>
    <form id="new-capsule-form">
      <input type="text" id="title" placeholder="Titre" required /><br>
      <textarea id="content" placeholder="Contenu" required></textarea><br>
      <button type="submit">Publier</button>
    </form>

    <h2>💬 Commentaires</h2>
    <div id="comments-section"></div>
  </div>
</body>
</html>
