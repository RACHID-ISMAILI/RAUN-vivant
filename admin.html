<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Admin Capsules RAUN</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <style>
    body {
      background: black;
      color: lime;
      font-family: monospace;
      padding: 20px;
    }
    input, textarea {
      display: block;
      margin: 5px 0;
    }
    button {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>🔐 <span style="color:lime">Espace Admin RAUN</span></h1>

  <h2>➕ Nouvelle Capsule</h2>
  <input id="capsuleTitle" type="text" placeholder="Titre" />
  <textarea id="capsuleText" placeholder="Contenu"></textarea>
  <button onclick="publierCapsule()">Publier</button>

  <h2>🛠️ Mettre à jour les anciennes capsules</h2>
  <button onclick="convertirTexte()">🔁 Convertir texte → content/title</button>
  <button onclick="corrigerCapsulesVides()">⚙️ Corriger capsules vides</button>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD0R0IFgjCk3gWgVxK3-WnfLubhAqsKbOM",
      authDomain: "raun-network.firebaseapp.com",
      projectId: "raun-network"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function publierCapsule() {
      const titre = document.getElementById("capsuleTitle").value.trim();
      const texte = document.getElementById("capsuleText").value.trim();

      if (!texte) {
        alert("Écris une capsule avant de publier.");
        return;
      }

      db.collection("capsules").add({
        title: titre || "...",
        content: texte,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      })
      .then(() => {
        alert("Capsule publiée 🔥");
        document.getElementById("capsuleText").value = "";
        document.getElementById("capsuleTitle").value = "";
      })
      .catch((error) => {
        alert("Erreur : " + error.message);
      });
    }

    function convertirTexte() {
      db.collection("capsules").get().then(snapshot => {
        const batch = db.batch();
        snapshot.forEach(doc => {
          const data = doc.data();
          if (data.texte && (!data.content || !data.title)) {
            const docRef = db.collection("capsules").doc(doc.id);
            batch.update(docRef, {
              content: data.texte,
              title: "..."
            });
          }
        });
        return batch.commit();
      }).then(() => {
        alert("🎉 Mise à jour terminée !");
      }).catch(error => {
        alert("Erreur pendant la mise à jour : " + error.message);
      });
    }

    function corrigerCapsulesVides() {
      db.collection("capsules").get().then(snapshot => {
        const batch = db.batch();
        snapshot.forEach(doc => {
          const data = doc.data();
          const docRef = db.collection("capsules").doc(doc.id);

          let updateData = {};
          if (!data.title) updateData.title = "...";
          if (!data.content && data.texte) updateData.content = data.texte;
          else if (!data.content) updateData.content = "Contenu vide";

          if (Object.keys(updateData).length > 0) {
            batch.update(docRef, updateData);
          }
        });
        return batch.commit();
      }).then(() => {
        alert("✅ Capsules vides corrigées !");
      }).catch(error => {
        alert("Erreur : " + error.message);
      });
    }
  </script>
</body>
</html>
