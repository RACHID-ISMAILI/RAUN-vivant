
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Capsules RAUN</title>
  <link rel="stylesheet" href="css/matrix.css">
  <style>
    body {
      background-color: black;
      color: #00ff00;
      font-family: "Courier New", Courier, monospace;
      padding: 20px;
    }
    .capsule-container {
      max-width: 800px;
      margin: auto;
    }
    .capsule {
      background: rgba(0, 0, 0, 0.6);
      border-left: 4px solid #00ff00;
      padding: 15px;
      margin-bottom: 20px;
      animation: fadeIn 2s ease forwards;
      opacity: 0;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="capsule-container">
    <h1>🌌 Capsules de Conscience</h1>
    <div id="capsules"></div>
