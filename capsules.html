
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Capsules de Conscience</title>
</head>
<body style="background-color:black; color:lime; font-family:monospace;">
  <h2>💭 Capsules de Conscience</h2>
  <div id="capsules">Chargement...</div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD0R0IFgjCk3gWgVxK3-WnfLubhAqsKbOM",
      authDomain: "raun-network.firebaseapp.com",
      projectId: "raun-network"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function afficherCapsules() {
      const container = document.getElementById("capsules");
      db.collection("capsules").orderBy("timestamp", "desc").get()
        .then((querySnapshot) => {
          container.innerHTML = "";
          querySnapshot.forEach((doc) => {
            const data = doc.data();
            const titre = data.title || "...";
            const contenu = data.content || "Contenu vide";
            const compteur = data.readCount || 0;

            const capsule = document.createElement("div");
            capsule.innerHTML = `
              <hr />
              <h3>${titre}</h3>
              <p>${contenu}</p>
              <p>👁️ Lectures : <span id="lecture-${doc.id}">${compteur}</span></p>
            `;
            container.appendChild(capsule);

            const key = "lu_" + doc.id;
            if (!localStorage.getItem(key)) {
              db.collection("capsules").doc(doc.id).update({
                readCount: firebase.firestore.FieldValue.increment(1)
              }).then(() => {
                localStorage.setItem(key, "1");
                document.getElementById("lecture-" + doc.id).textContent = compteur + 1;
              });
            }
          });
        });
    }

    document.addEventListener("DOMContentLoaded", afficherCapsules);
  </script>
</body>
</html>
