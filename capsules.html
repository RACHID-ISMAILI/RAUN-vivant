
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Capsules de Conscience 🔥</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <style>
    body {
      background-color: black;
      color: lime;
      font-family: monospace;
      padding: 20px;
    }
    .capsule {
      border: 1px solid lime;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      background-color: black;
      color: lime;
      border: 1px solid lime;
      cursor: pointer;
      margin-right: 5px;
    }
    textarea {
      background-color: black;
      color: lime;
      border: 1px solid lime;
      width: 100%;
      margin-top: 5px;
    }
    .comments {
      margin-top: 10px;
      padding: 5px;
      border-top: 1px dashed lime;
    }
  </style>
</head>
<body>
  <h2>Capsules de Conscience 🔥 Live</h2>
  <div id="capsules"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD0R0IFgjCk3gWgVxK3-WnfLubhAqsKbOM",
      authDomain: "raun-network.firebaseapp.com",
      projectId: "raun-network"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function renderCapsules() {
      db.collection("capsules").orderBy("timestamp", "desc").onSnapshot(snapshot => {
        const container = document.getElementById("capsules");
        container.innerHTML = "";
        snapshot.forEach(doc => {
          const data = doc.data();
          const div = document.createElement("div");
          div.className = "capsule";

          const commentsHTML = (data.comments || [])
            .map(comment => `<p>💬 ${comment}</p>`)
            .join("");

          div.innerHTML = `
            <h3>${data.title || "Sans titre"}</h3>
            <p>${data.text}</p>
            <p>👁 Lectures : ${data.readCount || 0}</p>
            <button onclick="vote('${doc.id}', 'up')">👍 ${data.votesUp || 0}</button>
            <button onclick="vote('${doc.id}', 'down')">👎 ${data.votesDown || 0}</button>
            <div class="comments">${commentsHTML}</div>
            <textarea id="comment-${doc.id}" rows="2" placeholder="Laisser un commentaire..."></textarea><br>
            <button onclick="commenter('${doc.id}')">Commenter</button>
          `;
          container.appendChild(div);

          db.collection("capsules").doc(doc.id).update({
            readCount: (data.readCount || 0) + 1
          }).catch(e => console.log("Erreur lecture:", e));
        });
      });
    }

    function vote(id, type) {
      const capsuleRef = db.collection("capsules").doc(id);
      capsuleRef.get().then(doc => {
        if (doc.exists) {
          const data = doc.data();
          const update = type === 'up' ? 
            { votesUp: (data.votesUp || 0) + 1 } : 
            { votesDown: (data.votesDown || 0) + 1 };
          capsuleRef.update(update).catch(e => console.log("Erreur vote:", e));
        }
      }).catch(e => console.log("Erreur récupération doc:", e));
    }

    function commenter(id) {
      const input = document.getElementById(`comment-${id}`);
      const commentaire = input.value.trim();
      if (commentaire) {
        const capsuleRef = db.collection("capsules").doc(id);
        capsuleRef.update({
          comments: firebase.firestore.FieldValue.arrayUnion(commentaire)
        }).then(() => {
          input.value = "";
        }).catch(e => console.log("Erreur ajout commentaire:", e));
      }
    }

    renderCapsules();
  </script>
</body>
</html>
