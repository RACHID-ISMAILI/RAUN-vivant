
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Capsules de Conscience</title>
</head>
<body style="background-color:black; color:lime; font-family:monospace;">
  <div id="user-status"></div>
  <button onclick="logout()">Déconnexion</button>

  <h1>🧠 Capsules de Conscience</h1>
  <p>💬 La vérité ne s'impose pas, elle s’éveille.</p>

  <script>
    const user = localStorage.getItem("RAUN_user");
    if (!user) {
      window.location.href = "login.html";
    } else {
      document.getElementById("user-status").innerText = "🟢 Connecté : " + user;
    }

    function logout() {
      localStorage.removeItem("RAUN_user");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
