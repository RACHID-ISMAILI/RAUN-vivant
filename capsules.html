
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Capsules de Conscience</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <style>
    body {
      background-color: black;
      color: lime;
      font-family: monospace;
      padding: 20px;
    }
    h2 {
      color: deeppink;
      border-bottom: 1px solid lime;
      padding-bottom: 10px;
    }
    .capsule {
      border: 1px solid lime;
      padding: 10px;
      margin-bottom: 20px;
    }
    .comment-box {
      margin-top: 10px;
      border-top: 1px dashed lime;
      padding-top: 10px;
    }
    input, textarea, button {
      font-family: monospace;
      padding: 5px;
      margin-top: 5px;
      background-color: black;
      color: lime;
      border: 1px solid lime;
    }
    .comment {
      margin-top: 5px;
      padding-left: 10px;
    }
  </style>
</head>
<body>
  <h2>🧠 Capsules de Conscience</h2>
  <div id="capsules-container">Chargement...</div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD0R0IFgjCk3gWgVxK3-WnfLubhAqsKbOM",
      authDomain: "raun-network.firebaseapp.com",
      projectId: "raun-network",
      storageBucket: "raun-network.appspot.com",
      messagingSenderId: "541416001018",
      appId: "1:541416001018:web:ba7efef5aea63a30206843"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadCapsules() {
      const container = document.getElementById("capsules-container");
      container.innerHTML = "";

      const snapshot = await db.collection("capsules").orderBy("timestamp", "desc").get();
      snapshot.forEach(async (doc) => {
        const capsule = doc.data();
        const capsuleId = doc.id;
        const capsuleDiv = document.createElement("div");
        capsuleDiv.className = "capsule";
        capsuleDiv.innerHTML = `
          <p>...</p>
          <p>${capsule.text}</p>
          <p>👁 Lectures : <span id="views-${capsuleId}">Chargement...</span></p>
          <div class="comment-box" id="comments-${capsuleId}">
            <strong>💬 Commentaires :</strong>
            <div id="comment-list-${capsuleId}">Chargement...</div>
            <input type="text" id="author-${capsuleId}" placeholder="Ton prénom (facultatif)" />
            <textarea id="message-${capsuleId}" placeholder="Ton message..."></textarea>
            <button onclick="submitComment('${capsuleId}')">Envoyer</button>
          </div>
        `;
        container.appendChild(capsuleDiv);
        loadComments(capsuleId);

        const storageKey = "read_" + capsuleId;
        if (!localStorage.getItem(storageKey)) {
          db.collection("capsules").doc(capsuleId).update({
            views: firebase.firestore.FieldValue.increment(1)
          }).then(async () => {
            localStorage.setItem(storageKey, "1");
            const updatedDoc = await db.collection("capsules").doc(capsuleId).get();
            const updatedViews = updatedDoc.data().views || 0;
            const viewSpan = document.getElementById("views-" + capsuleId);
            if (viewSpan) {
              viewSpan.textContent = updatedViews;
            }
          }).catch((error) => {
            console.error("Erreur compteur vues :", error);
          });
        } else {
          const docSnapshot = await db.collection("capsules").doc(capsuleId).get();
          const currentViews = docSnapshot.data().views || 0;
          const viewSpan = document.getElementById("views-" + capsuleId);
          if (viewSpan) {
            viewSpan.textContent = currentViews;
          }
        }
      });
    }

    async function loadComments(capsuleId) {
      const list = document.getElementById(`comment-list-${capsuleId}`);
      const snapshot = await db.collection("commentaires").where("capsuleId", "==", capsuleId).orderBy("timestamp").get();
      list.innerHTML = "";
      snapshot.forEach((doc) => {
        const c = doc.data();
        const p = document.createElement("p");
        p.className = "comment";
        p.innerHTML = `<strong>${c.author || "Anonyme"}:</strong> ${c.message}`;
        list.appendChild(p);
      });
    }

    async function submitComment(capsuleId) {
      const author = document.getElementById(`author-${capsuleId}`).value;
      const message = document.getElementById(`message-${capsuleId}`).value;
      if (message.trim() === "") return;
      await db.collection("commentaires").add({
        capsuleId,
        author,
        message,
        timestamp: new Date()
      });
      document.getElementById(`message-${capsuleId}`).value = "";
      loadComments(capsuleId);
    }

    loadCapsules();
  </script>
</body>
</html>
