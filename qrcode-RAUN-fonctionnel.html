
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>QR Code RAUN</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <style>
    body {
      background-color: black;
      color: lime;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    canvas {
      margin-top: 20px;
      border: 2px solid lime;
      padding: 10px;
      background: white;
    }
    a {
      color: cyan;
      margin-top: 30px;
      font-size: 1.1rem;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h2>📱 Installe RAUN sur ton téléphone</h2>
  <canvas id="qrcode"></canvas>
  <a href="index.html">⬅️ Retour à l’accueil</a>

  <script>
    const canvas = document.getElementById('qrcode');
    const url = "https://rachid-ismaili.github.io/RAUN-vivant/";
    QRCode.toCanvas(canvas, url, {
      width: 200,
      color: {
        dark: '#000000',
        light: '#ffffff'
      }
    }, function (error) {
      if (error) console.error(error);
    });
  </script>
</body>
</html>
