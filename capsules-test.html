
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Test Capsules RAUN - Votes & Commentaires</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <style>
    body {
      background-color: black;
      color: lime;
      font-family: monospace;
      padding: 20px;
    }
    .capsule {
      border: 1px solid lime;
      margin-bottom: 20px;
      padding: 10px;
    }
    button {
      background-color: black;
      color: lime;
      border: 1px solid lime;
      cursor: pointer;
      padding: 5px 10px;
      margin-right: 10px;
    }
    textarea {
      background-color: black;
      color: lime;
      border: 1px solid lime;
      width: 100%;
      margin-top: 10px;
    }
    .comment {
      margin-top: 5px;
      padding-top: 5px;
      border-top: 1px dashed lime;
    }
  </style>
</head>
<body>
  <h1>🧪 Test Capsules RAUN - Votes 👍👎 et Commentaires</h1>
  <div id="capsules">Chargement...</div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD0R0IFgjCk3gWgVxK3-WnfLubhAqsKbOM",
      authDomain: "raun-network.firebaseapp.com",
      projectId: "raun-network",
      storageBucket: "raun-network.appspot.com",
      messagingSenderId: "541416001018",
      appId: "1:541416001018:web:ba7efef5aea63a30206843"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadCapsules() {
      const container = document.getElementById("capsules");
      const snapshot = await db.collection("capsules").orderBy("timestamp", "desc").get();
      container.innerHTML = "";
      snapshot.forEach(doc => {
        const data = doc.data();
        const id = doc.id;
        const votesUp = data.votesUp || 0;
        const votesDown = data.votesDown || 0;
        const texte = data.text || "Capsule vide";

        const capsuleDiv = document.createElement("div");
        capsuleDiv.className = "capsule";
        capsuleDiv.innerHTML = `
          <p>${texte}</p>
          <p>
            <button onclick="vote('${id}', 'votesUp')">👍 <span id="up-${id}">${votesUp}</span></button>
            <button onclick="vote('${id}', 'votesDown')">👎 <span id="down-${id}">${votesDown}</span></button>
          </p>
          <textarea id="comment-${id}" placeholder="💬 Ton commentaire..."></textarea>
          <button onclick="addComment('${id}')">Commenter</button>
          <div id="comments-${id}"></div>
        `;
        container.appendChild(capsuleDiv);
        loadComments(id);
      });
    }

    function vote(id, type) {
      const key = "voted-" + id;
      if (localStorage.getItem(key)) {
        alert("Tu as déjà voté !");
        return;
      }
      db.collection("capsules").doc(id).update({
        [type]: firebase.firestore.FieldValue.increment(1)
      }).then(() => {
        localStorage.setItem(key, "1");
        const span = document.getElementById((type === "votesUp" ? "up-" : "down-") + id);
        span.textContent = parseInt(span.textContent) + 1;
      });
    }

    function addComment(id) {
      const textarea = document.getElementById("comment-" + id);
      const message = textarea.value.trim();
      if (!message) return;
      db.collection("commentaires").add({
        capsuleId: id,
        message: message,
        timestamp: new Date()
      }).then(() => {
        textarea.value = "";
        loadComments(id);
      });
    }

    async function loadComments(id) {
      const container = document.getElementById("comments-" + id);
      const snapshot = await db.collection("commentaires")
        .where("capsuleId", "==", id)
        .orderBy("timestamp", "desc")
        .limit(5)
        .get();
      container.innerHTML = "";
      snapshot.forEach(doc => {
        const data = doc.data();
        const div = document.createElement("div");
        div.className = "comment";
        div.textContent = "💬 " + data.message;
        container.appendChild(div);
      });
    }

    loadCapsules();
  </script>
</body>
</html>
