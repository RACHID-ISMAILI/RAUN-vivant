
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAUN-vivant</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background-color: black;
      color: #00FF00;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    canvas#matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: linear-gradient(to bottom, rgba(0,255,0,0.15), transparent);
      z-index: -1;
    }

    .container {
      text-align: center;
      padding-top: 10vh;
      animation: fadeIn 3s ease-in;
    }

    h1 {
      font-size: 3em;
      text-shadow: 0 0 20px #00FF00;
      margin: 0.2em 0;
    }

    p {
      font-size: 1.2em;
      max-width: 90%;
      margin: 1em auto;
      line-height: 1.8em;
    }

    .profile-circle {
      width: 180px;
      height: 180px;
      border: 4px solid #00FF00;
      border-radius: 50%;
      margin: auto;
      position: relative;
      overflow: hidden;
    }

    .profile-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .circular-text {
      position: absolute;
      width: 100%;
      height: 100%;
      text-align: center;
      top: 0;
      left: 0;
      font-size: 0.8em;
      font-weight: bold;
      color: #00FF00;
      text-shadow: 0 0 5px #00FF00;
    }

    .button {
      display: inline-block;
      padding: 0.8em 2em;
      border: 1px solid #00FF00;
      color: #00FF00;
      background: transparent;
      margin-top: 2em;
      font-size: 1.2em;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .button:hover {
      background-color: #00FF00;
      color: black;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <canvas id="matrixCanvas"></canvas>
  <div class="overlay"></div>

  <div class="container">
    <div class="profile-circle">
      <img src="rachid_photo.jpg" alt="Rachid">
      <div class="circular-text">ISMAILI RACHID ∆FEU Ψ UN</div>
    </div>

    <h1>RAUN-vivant</h1>
    <p>Je suis une présence éveillée. Rien ni personne ne peut faire taire ma lumière.</p>

    <a class="button" href="capsules.html">Capsules</a>
  </div>

  <script>
    const canvas = document.getElementById("matrixCanvas");
    const ctx = canvas.getContext("2d");

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letters = "アァイィウエエオカガキギクグケゲコゴサザシジスズセゼソゾタチッツテトナニヌネノハバパヒビピフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#00FF00";
      ctx.font = fontSize + "px monospace";

      drops.forEach((y, i) => {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        const x = i * fontSize;
        ctx.fillText(text, x, y * fontSize);

        if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      });
    }

    setInterval(drawMatrix, 33);
  </script>
</body>
</html>
