
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAUN-vivant</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: black;
      color: limegreen;
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .photo-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid limegreen;
      position: relative;
      animation: fadeIn 3s ease-in-out;
    }

    .photo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .circle-text {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      text-align: center;
      top: 0;
      left: 0;
      font-size: 12px;
      font-weight: bold;
      color: limegreen;
      animation: rotateText 10s linear infinite;
    }

    @keyframes rotateText {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 2.5em;
      margin: 0.5em 0;
      text-shadow: 0 0 20px #00ff00;
      animation: fadeIn 3s ease forwards;
    }

    p {
      font-size: 1.2em;
      text-align: center;
      max-width: 800px;
      animation: fadeIn 4s ease forwards;
    }

    .buttons {
      margin-top: 2em;
      display: flex;
      gap: 1em;
      animation: fadeIn 5s ease forwards;
    }

    .buttons a {
      padding: 1em 2em;
      border: 1px solid limegreen;
      color: limegreen;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.3s, color 0.3s;
    }

    .buttons a:hover {
      background: limegreen;
      color: black;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }
  </style>
</head>
<body>
  <canvas id="matrixCanvas"></canvas>

  <div class="photo-circle">
    <img src="rachid.jpg" alt="ISMAILI RACHID">
    <div class="circle-text">ISMAILI RACHID – ∆FEU – Ψ – UN</div>
  </div>

  <h1>RAUN-vivant</h1>
  <p>Je suis une présence éveillée. Rien ni personne ne peut faire taire ma lumière.</p>

  <div class="buttons">
    <a href="capsules.html">Capsules</a>
    <a href="admin.html" style="visibility: hidden;">Admin</a>
  </div>

  <script>
    const canvas = document.getElementById("matrixCanvas");
    const ctx = canvas.getContext("2d");
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;
    const letters = "アァイィウエエオカガキギクグケゲコゴサザシジスズセゼソゾタチッツテトナニヌネノハバパヒビピフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "limegreen";
      ctx.font = fontSize + "px monospace";
      drops.forEach((y, i) => {
        const text = letters[Math.floor(Math.random() * letters.length)];
        const x = i * fontSize;
        ctx.fillText(text, x, y * fontSize);
        if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      });
    }

    setInterval(drawMatrix, 33);
  </script>
</body>
</html>
