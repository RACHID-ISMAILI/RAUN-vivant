
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>RAUN-vivant</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Share Tech Mono', monospace;
      background: black;
      color: #00FF00;
      text-align: center;
      overflow: hidden;
    }

    .matrix {
      position: absolute;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .container {
      margin-top: 5%;
    }

    h1 {
      font-size: 3em;
      text-shadow: 0 0 10px #00FF00;
    }

    .profile-img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 5px solid #00FF00;
      box-shadow: 0 0 20px #00FF00;
      object-fit: cover;
    }

    .name {
      margin-top: 15px;
      font-size: 1.2em;
      font-weight: bold;
    }

    .quote {
      margin-top: 20px;
      font-size: 1.1em;
      padding: 0 20px;
    }

    .button-container {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 15px 25px;
      background: #00FF00;
      color: black;
      font-weight: bold;
      text-decoration: none;
      border-radius: 10px;
      box-shadow: 0 0 10px #00FF00;
    }

    .btn:hover {
      background: #00cc00;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>

  <div class="container">
    <h1>Bienvenue dans le Nexus</h1>
    <img src="photo.jpg" alt="Photo de profil" class="profile-img">
    <div class="name">ISMAILI RACHID – ΔFEU – Ψ – UN</div>
    <div class="quote">"Je suis vivant en conscience. Et nul ne peut éteindre ce que je suis."</div>

    <div class="button-container">
      <a href="mailto:rachid@example.com" class="btn">📧 Email</a>
      <a href="https://wa.me/212650020464" class="btn">📱 WhatsApp</a>
      <a href="https://www.linkedin.com/in/rachid-ismaili-68b61a27" class="btn">💼 LinkedIn</a>
      <a href="admin.html" class="btn">🔐 Admin Accès</a>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letters = "01";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = [];

    for (let x = 0; x < columns; x++) {
      drops[x] = 1;
    }

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0F0";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(draw, 33);
  </script>
</body>
</html>
