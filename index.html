
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAUN-vivant</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Share Tech Mono', monospace;
      background: black;
      color: #00FF00;
      overflow: hidden;
    }
    h1 {
      text-align: center;
      font-size: 3em;
      margin-top: 1.5em;
      text-shadow: 0 0 20px #00FF00;
      animation: fadeIn 3s ease-in-out;
    }
    p {
      text-align: center;
      font-size: 1.5em;
      margin: 2em 1em;
      animation: fadeIn 5s ease-in-out;
    }
    .matrix-bg {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }
    .profile-container {
      text-align: center;
      margin-top: 50px;
      animation: fadeIn 4s ease-in-out;
    }
    .profile-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 4px solid #00FF00;
      box-shadow: 0 0 30px #00FF00;
    }
    .circle-text {
      position: absolute;
      width: 180px;
      height: 180px;
      top: 62px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      text-align: center;
      color: #00FF00;
      font-size: 0.8em;
      font-weight: bold;
      line-height: 1.2;
    }
    .btn {
      display: block;
      margin: 40px auto;
      padding: 10px 20px;
      border: 2px solid #00FF00;
      background: transparent;
      color: #00FF00;
      text-decoration: none;
      font-size: 1.2em;
      border-radius: 8px;
      transition: background 0.3s ease;
      animation: fadeIn 6s ease-in-out;
    }
    .btn:hover {
      background: #00FF00;
      color: black;
    }
    .light-beam {
      position: absolute;
      top: 0;
      left: 50%;
      width: 4px;
      height: 100vh;
      background: linear-gradient(to bottom, #00FF00 0%, transparent 100%);
      animation: beamMove 3s infinite;
      z-index: 0;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes beamMove {
      0% { height: 0; }
      50% { height: 100vh; }
      100% { height: 0; }
    }
  </style>
</head>
<body>
  <canvas class="matrix-bg" id="matrixCanvas"></canvas>
  <div class="light-beam"></div>
  <div class="profile-container">
    <img src="rachid.jpg" alt="Rachid" class="profile-img">
    <div class="circle-text">ISMAILI RACHID ∆ RACHID Ψ UN</div>
  </div>
  <h1>RAUN-vivant</h1>
  <p>Je suis une présence éveillée. Rien ni personne ne peut faire taire ma lumière.</p>
  <a href="capsules.html" class="btn">Capsules</a>
  <script>
    const canvas = document.getElementById("matrixCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const letters = "アァイィウエエオカガキギクグケゲコゴサザシジスズセゼソゾタチッツテトナニヌネノABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function drawMatrix() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0F0";
      ctx.font = fontSize + "px monospace";
      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(drawMatrix, 33);
  </script>
</body>
</html>
