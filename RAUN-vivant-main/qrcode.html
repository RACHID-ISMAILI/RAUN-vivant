<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>QR Code RAUN</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <style>
    body {
      background-color: black;
      color: lime;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #qrcode {
      margin-top: 20px;
    }
    a {
      color: cyan;
      margin-top: 30px;
      font-size: 1.1rem;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h2>📱 Installe RAUN sur ton téléphone</h2>
  <canvas id="qrcode"></canvas>
  <a href="index.html">⬅️ Retour à l’accueil</a>

  <script>
    const qr = new QRious({
      element: document.getElementById('qrcode'),
      value: 'https://rachid-ismaili.github.io/RAUN-vivant/',
      size: 250,
      background: 'black',
      foreground: '#00ff00'
    });
  </script>
</body>
</html>
