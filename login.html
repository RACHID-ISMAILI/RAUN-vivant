
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion à RAUN</title>
</head>
<body style="background-color: black; color: lime; font-family: monospace;">
  <h2>Connexion à l’espace RAUN 🧠</h2>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Mot de passe"><br>
  <button onclick="connecter()">Se connecter</button>

  <script>
    function connecter() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      if (email === "raun@rachid.com" && password === "vivant2025") {
        localStorage.setItem("RAUN_user", email);
        window.location.href = "capsules.html";
      } else {
        alert("Mauvais identifiants!");
      }
    }
  </script>
</body>
</html>
