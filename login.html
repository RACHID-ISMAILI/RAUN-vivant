
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion à l’espace RAUN 🔐</title>
  <style>
    body {
      background-color: black;
      color: lime;
      font-family: monospace;
      text-align: center;
      padding: 40px;
    }
    input {
      background-color: black;
      color: lime;
      border: 1px solid lime;
      padding: 5px;
      font-family: monospace;
      margin: 5px;
    }
    button {
      background-color: black;
      color: lime;
      border: 1px solid lime;
      padding: 5px 10px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h2>🔐 Connexion à l’espace RAUN</h2>
  <input type="email" placeholder="Email" id="email" value="raun@rachid.com"><br>
  <input type="password" placeholder="Mot de passe" id="password"><br>
  <button onclick="login()">Se connecter</button>
  <br><br>
  <a href="index.html">
    <button>🔙 Retour à la page publique</button>
  </a>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyD0R0IFgjCk3gWgVxK3-WnfLubhAqsKbOM",
      authDomain: "raun-network.firebaseapp.com",
      projectId: "raun-network"
    };
    firebase.initializeApp(firebaseConfig);

    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      firebase.auth().signInWithEmailAndPassword(email, password)
        .then(() => {
          window.location.href = "admin.html";
        })
        .catch((error) => {
          alert("Erreur de connexion : " + error.message);
        });
    }
  </script>
</body>
</html>
